<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | Space-Docx</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { width: 100%; max-width: 500px; padding: 24px; }
        .card { background: #111; border: 1px solid #2a2a2a; border-radius: 24px; padding: 40px; }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo-svg { width: 48px; height: 48px; margin: 0 auto; }
        .logo-text { font-size: 22px; font-weight: 700; color: #dc2626; margin-top: 12px; }
        h1 { font-size: 28px; margin-bottom: 8px; text-align: center; }
        .subtitle { color: #a0a0a0; font-size: 14px; margin-bottom: 32px; text-align: center; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 13px; color: #a0a0a0; margin-bottom: 8px; }
        input { width: 100%; padding: 14px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; color: white; font-size: 14px; }
        input:focus { outline: none; border-color: #dc2626; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .btn { width: 100%; padding: 14px; background: #dc2626; border: none; border-radius: 40px; color: white; font-weight: 700; font-size: 16px; cursor: pointer; transition: all 0.2s; margin-top: 16px; }
        .btn:hover { background: #b91c1c; transform: translateY(-2px); }
        .login-link { text-align: center; margin-top: 24px; font-size: 13px; color: #a0a0a0; }
        .login-link a { color: #dc2626; text-decoration: none; }
        .flash-error { background: rgba(220,38,38,0.15); border: 1px solid rgba(220,38,38,0.3); padding: 12px; border-radius: 10px; margin-bottom: 20px; color: #dc2626; font-size: 13px; }
        .flash-success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); padding: 12px; border-radius: 10px; color: #22c55e; }
        @media (max-width: 768px) { .container { padding: 16px; } .card { padding: 24px; } .row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <svg class="logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M50 10 L90 30 L90 70 L50 90 L10 70 L10 30 L50 10Z" stroke="#dc2626" stroke-width="4" fill="none"/>
                    <path d="M50 30 L65 40 L65 60 L50 70 L35 60 L35 40 L50 30Z" stroke="#dc2626" stroke-width="3" fill="none"/>
                    <circle cx="50" cy="50" r="8" fill="#dc2626"/>
                </svg>
                <div class="logo-text">SPACE-DOCX</div>
            </div>
            <h1>Criar conta</h1>
            <p class="subtitle">Comece seu teste gratuito de 7 dias</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-group"><label>Nome completo</label><input type="text" name="nome" required></div>
                <div class="form-group"><label>E-mail corporativo</label><input type="email" name="email" required></div>
                <div class="form-group"><label>Senha</label><input type="password" name="senha" required></div>
                <div class="form-group"><label>Empresa</label><input type="text" name="empresa"></div>
                <div class="row">
                    <div><label>CPF/CNPJ</label><input type="text" name="cpf_cnpj" id="cpfCnpj"></div>
                    <div><label>Telefone</label><input type="text" name="telefone" id="telefone"></div>
                </div>
                <div class="form-group"><label>CEP</label><input type="text" name="cep" id="cep" placeholder="00000-000"></div>
                <button type="submit" class="btn">Criar conta gratuita</button>
            </form>
            <div class="login-link">Já tem conta? <a href="/login">Faça login</a></div>
        </div>
    </div>
    <script>
        document.getElementById('cpfCnpj')?.addEventListener('input', function(e) {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 14) v = v.slice(0,14);
            if (v.length > 11) v = v.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, '$1.$2.$3/$4-$5');
            else if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
            else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
            else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, '$1.$2');
            e.target.value = v;
        });
        document.getElementById('telefone')?.addEventListener('input', function(e) {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 11) v = v.slice(0,11);
            if (v.length > 10) v = v.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
            else if (v.length > 6) v = v.replace(/(\d{2})(\d{4})(\d{0,4})/, '($1) $2-$3');
            e.target.value = v;
        });
        document.getElementById('cep')?.addEventListener('input', function(e) {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 8) v = v.slice(0,8);
            if (v.length > 5) v = v.slice(0,5) + '-' + v.slice(5);
            e.target.value = v;
        });
    </script>
</body>
</html>
