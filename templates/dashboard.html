<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Space-Docx</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; }
        .app { display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background: #111; border-right: 1px solid #2a2a2a; padding: 32px 24px; position: fixed; height: 100vh; overflow-y: auto; }
        .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; padding-bottom: 24px; border-bottom: 1px solid #2a2a2a; }
        .logo-svg { width: 32px; height: 32px; }
        .logo-text { font-size: 20px; font-weight: 700; color: #dc2626; }
        .nav-item { display: block; padding: 12px 16px; border-radius: 12px; color: #a0a0a0; text-decoration: none; margin-bottom: 8px; cursor: pointer; transition: all 0.2s; }
        .nav-item:hover, .nav-item.active { background: #1a1a1a; color: #dc2626; }
        .main { flex: 1; margin-left: 280px; padding: 32px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid #2a2a2a; flex-wrap: wrap; gap: 16px; }
        .plan-badge { padding: 6px 16px; background: #1a1a1a; border-radius: 30px; font-size: 12px; color: #dc2626; font-weight: 600; }
        .creditos-badge { padding: 6px 16px; background: #1a1a1a; border-radius: 30px; font-size: 12px; color: #22c55e; font-weight: 600; }
        .logout-btn { padding: 8px 20px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 30px; color: #a0a0a0; text-decoration: none; transition: all 0.2s; }
        .logout-btn:hover { background: #dc2626; color: white; border-color: #dc2626; }
        .upload-card { background: #111; border: 1px solid #2a2a2a; border-radius: 20px; padding: 32px; }
        .upload-area { border: 2px dashed #2a2a2a; border-radius: 16px; padding: 48px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .upload-area:hover { border-color: #dc2626; background: rgba(220,38,38,0.05); }
        .upload-icon { font-size: 48px; margin-bottom: 16px; }
        .file-info { margin-top: 16px; padding: 12px; background: #1a1a1a; border-radius: 12px; color: #22c55e; display: none; }
        .btn-primary { width: 100%; padding: 14px; background: #dc2626; border: none; border-radius: 40px; color: white; font-weight: 700; cursor: pointer; margin-top: 20px; transition: all 0.2s; }
        .btn-primary:hover { background: #b91c1c; transform: translateY(-2px); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .result-card { background: #111; border: 1px solid #2a2a2a; border-radius: 20px; padding: 32px; margin-top: 32px; text-align: center; }
        .score-circle { width: 140px; height: 140px; border-radius: 50%; margin: 20px auto; display: flex; align-items: center; justify-content: center; position: relative; }
        .score-circle::before { content: ''; position: absolute; width: 110px; height: 110px; background: #111; border-radius: 50%; }
        .score-value { position: relative; font-size: 48px; font-weight: 800; }
        .status { font-size: 24px; font-weight: 700; margin: 20px 0; }
        .historico-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .historico-table th, .historico-table td { padding: 14px; text-align: left; border-bottom: 1px solid #2a2a2a; }
        .historico-table th { color: #dc2626; font-weight: 600; }
        .spinner { width: 50px; height: 50px; border: 3px solid #2a2a2a; border-top-color: #dc2626; border-radius: 50%; margin: 20px auto; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .warning-badge { background: rgba(220,38,38,0.15); border: 1px solid rgba(220,38,38,0.3); padding: 16px; border-radius: 16px; margin-bottom: 20px; text-align: center; }
        .warning-badge a { color: #dc2626; text-decoration: none; font-weight: 600; }
        .creditos-info { font-size: 13px; color: #888; margin-top: 8px; text-align: center; }
        @media (max-width: 768px) { .sidebar { display: none; } .main { margin-left: 0; padding: 20px; } }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="logo">
                <svg class="logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M50 10 L90 30 L90 70 L50 90 L10 70 L10 30 L50 10Z" stroke="#dc2626" stroke-width="4" fill="none"/>
                    <path d="M50 30 L65 40 L65 60 L50 70 L35 60 L35 40 L50 30Z" stroke="#dc2626" stroke-width="3" fill="none"/>
                    <circle cx="50" cy="50" r="8" fill="#dc2626"/>
                </svg>
                <div class="logo-text">SPACE-DOCX</div>
            </div>
            <a class="nav-item active" onclick="mostrarSecao('analisar')">🔍 Analisar Documento</a>
            <a class="nav-item" onclick="mostrarSecao('historico')">📋 Histórico</a>
            <a href="/planos" class="nav-item">💰 Planos</a>
            <a href="/logout" class="nav-item" style="margin-top: 40px;">🚪 Sair</a>
        </aside>
        <main class="main">
            <div class="header">
                <div><h1>Painel de Controle</h1><p id="userInfo">Carregando...</p></div>
                <div><span class="plan-badge" id="planoInfo">-</span></div>
                <div><span class="creditos-badge" id="creditosInfo">-</span></div>
                <a href="/logout" class="logout-btn">Sair</a>
            </div>

            <div id="alertaBloqueio" style="display: none;" class="warning-badge">
                ⚠️ <span id="msgBloqueio"></span> <a href="/planos">👉 Adquirir plano agora</a>
            </div>

            <div id="secaoAnalisar">
                <div class="upload-card" id="uploadCard">
                    <h3>Validar Documento</h3>
                    <div id="creditosRestantes" class="creditos-info"></div>
                    <div class="upload-area" id="uploadArea">
                        <div class="upload-icon">📄</div>
                        <div>Clique ou arraste seu PDF aqui</div>
                        <div style="font-size: 12px; margin-top: 8px;">Máx. 10MB</div>
                        <input type="file" id="pdfFile" accept=".pdf" style="display:none">
                    </div>
                    <div id="fileInfo" class="file-info"></div>
                    <button class="btn-primary" id="btnAnalisar" disabled>Analisar Documento</button>
                </div>
                <div id="resultado" style="display:none"></div>
            </div>

            <div id="secaoHistorico" style="display:none">
                <div class="upload-card"><h3>Histórico de Validações</h3><div id="historicoList">Carregando...</div></div>
            </div>
        </main>
    </div>

    <script>
        let arquivoSelecionado = null;
        
        async function carregarUsuario() {
            try {
                const r = await fetch('/api/usuario');
                const d = await r.json();
                document.getElementById('userInfo').innerHTML = `${d.nome} | ${d.email}`;
                document.getElementById('planoInfo').innerHTML = d.plano?.toUpperCase() || 'TRIAL';
                document.getElementById('creditosInfo').innerHTML = `🎯 ${d.creditos} créditos`;
                document.getElementById('creditosRestantes').innerHTML = `📊 Créditos disponíveis: ${d.creditos}`;
                
                if (d.status === 'bloqueado') {
                    document.getElementById('alertaBloqueio').style.display = 'block';
                    document.getElementById('msgBloqueio').innerHTML = 'Sua conta está bloqueada. Seus créditos acabaram ou assinatura expirou.';
                    document.getElementById('btnAnalisar').disabled = true;
                    document.getElementById('uploadArea').style.opacity = '0.5';
                    document.getElementById('uploadArea').style.cursor = 'not-allowed';
                } else if (d.creditos === 0 || d.creditos === '0') {
                    document.getElementById('alertaBloqueio').style.display = 'block';
                    document.getElementById('msgBloqueio').innerHTML = 'Seus créditos acabaram! Adquira um plano para continuar.';
                    document.getElementById('btnAnalisar').disabled = true;
                } else {
                    document.getElementById('alertaBloqueio').style.display = 'none';
                }
            } catch(e) { console.error(e); }
        }

        async function carregarHistorico() {
            try {
                const r = await fetch('/api/historico');
                const d = await r.json();
                if(d.length === 0) { 
                    document.getElementById('historicoList').innerHTML = '<div style="text-align:center;padding:40px;">Nenhuma análise realizada ainda</div>'; 
                    return; 
                }
                let html = '<table class="historico-table"><thead><tr><th>DATA</th><th>ARQUIVO</th><th>STATUS</th><th>SCORE</th></tr></thead><tbody>';
                for (const item of d) {
                    let cor = item.status === 'AUTÊNTICO' ? '#22c55e' : (item.status === 'FRAUDE' ? '#ef4444' : '#f59e0b');
                    html += `<tr><td>${item.data}</td><td>${item.arquivo}</td><td style="color:${cor}">${item.status}</td><td>${item.score}/100</td></tr>`;
                }
                html += '</tbody></table>';
                document.getElementById('historicoList').innerHTML = html;
            } catch(e) { console.error(e); }
        }

        function mostrarSecao(secao) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('secaoAnalisar').style.display = secao === 'analisar' ? 'block' : 'none';
            document.getElementById('secaoHistorico').style.display = secao === 'historico' ? 'block' : 'none';
            if(secao === 'historico') carregarHistorico();
        }

        const uploadArea = document.getElementById('uploadArea');
        const pdfFile = document.getElementById('pdfFile');
        
        uploadArea.onclick = () => pdfFile.click();
        uploadArea.ondragover = (e) => { e.preventDefault(); uploadArea.style.borderColor = '#dc2626'; };
        uploadArea.ondragleave = () => uploadArea.style.borderColor = '#2a2a2a';
        uploadArea.ondrop = (e) => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if(file && file.type === 'application/pdf') processarArquivo(file);
            else alert('Selecione um arquivo PDF');
        };
        pdfFile.onchange = (e) => { if(e.target.files[0]) processarArquivo(e.target.files[0]); };

        function processarArquivo(file) {
            if(file.size > 10 * 1024 * 1024) { alert('Arquivo muito grande (máx 10MB)'); return; }
            arquivoSelecionado = file;
            const fileInfo = document.getElementById('fileInfo');
            fileInfo.style.display = 'block';
            fileInfo.innerHTML = `✅ ${file.name} (${(file.size / 1024).toFixed(0)} KB)`;
            document.getElementById('btnAnalisar').disabled = false;
        }

        function exibirResultados(data) {
            const cor = data.status_color || '#f59e0b';
            const scoreAngle = (data.score / 100) * 360;
            document.getElementById('resultado').innerHTML = `
                <div class="result-card">
                    <div class="score-circle" style="background: conic-gradient(${cor} ${scoreAngle}deg, #1a1a1a ${scoreAngle}deg)">
                        <span class="score-value" style="color:${cor}">${data.score}</span>
                    </div>
                    <div class="status" style="color:${cor}">${data.status_icon || ''} ${data.status}</div>
                    <div style="margin-top:16px;font-size:12px;color:#a0a0a0;">📅 ${data.data} | Análise concluída</div>
                    <div style="margin-top:12px;font-size:13px;color:#22c55e;">🎯 Créditos restantes: ${data.creditos_restantes}</div>
                </div>
            `;
            document.getElementById('resultado').style.display = 'block';
            document.getElementById('resultado').scrollIntoView({ behavior: 'smooth' });
            carregarHistorico();
            carregarUsuario();
        }

        document.getElementById('btnAnalisar').onclick = async () => {
            if(!arquivoSelecionado) return;
            const btn = document.getElementById('btnAnalisar');
            const uploadCard = document.getElementById('uploadCard');
            btn.disabled = true;
            document.getElementById('resultado').style.display = 'none';
            
            uploadCard.innerHTML = `
                <div style="text-align:center;padding:60px;">
                    <div class="spinner"></div>
                    <div id="mensagemAnimacao" style="color:#dc2626; margin-top:20px;">🔍 Analisando documento...</div>
                    <div id="tempoAnimacao" style="color:#a0a0a0; margin-top:10px;">Tempo estimado: 25-35 segundos</div>
                </div>
            `;
            
            const formData = new FormData();
            formData.append('pdf', arquivoSelecionado);
            
            try {
                const response = await fetch('/api/analisar', { method: 'POST', body: formData });
                const data = await response.json();
                
                if(data.bloqueado) {
                    alert(data.error);
                    window.location.href = '/planos';
                    return;
                }
                
                if(response.ok && data.success) {
                    exibirResultados(data);
                } else {
                    alert('Erro: ' + (data.error || 'Tente novamente'));
                }
            } catch(error) {
                alert('Erro: ' + error.message);
            } finally {
                location.reload();
            }
        };
        
        carregarUsuario();
        setInterval(() => carregarUsuario(), 30000);
    </script>
</body>
</html>
