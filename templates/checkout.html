<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Space-Docx</title>
    <script src="https://js.fastsoftbrasil.com/security.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { width: 100%; max-width: 550px; padding: 24px; }
        .card { background: #111; border: 1px solid #1f1f1f; border-radius: 24px; padding: 40px; }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo-icon { font-size: 48px; }
        .logo-text { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        h1 { font-size: 24px; margin-bottom: 8px; text-align: center; }
        .subtitle { color: #a1a1aa; font-size: 14px; margin-bottom: 24px; text-align: center; }
        .plan-summary { background: #1a1a1a; border-radius: 16px; padding: 20px; margin-bottom: 24px; text-align: center; }
        .plan-price { font-size: 28px; font-weight: 700; color: #3b82f6; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 13px; color: #a1a1aa; margin-bottom: 8px; }
        input, select { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; color: white; font-size: 14px; }
        input:focus { outline: none; border-color: #3b82f6; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #3b82f6, #2563eb); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; margin-top: 16px; font-size: 16px; transition: transform 0.2s; }
        .btn:hover { transform: translateY(-2px); }
        .btn-pix { background: linear-gradient(135deg, #10b981, #059669); margin-top: 8px; }
        .metodo-selector { display: flex; gap: 16px; margin-bottom: 24px; }
        .metodo-btn { flex: 1; padding: 12px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; color: #a1a1aa; cursor: pointer; text-align: center; transition: all 0.2s; }
        .metodo-btn.active { background: #3b82f6; border-color: #3b82f6; color: white; }
        .pix-area { background: #1a1a1a; border-radius: 16px; padding: 24px; text-align: center; margin-top: 16px; }
        .pix-code { background: #0a0a0a; padding: 16px; border-radius: 12px; font-family: monospace; font-size: 12px; word-break: break-all; margin: 16px 0; }
        .error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); padding: 12px; border-radius: 12px; color: #ef4444; font-size: 13px; display: none; margin-bottom: 16px; }
        .success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); padding: 12px; border-radius: 12px; color: #22c55e; font-size: 13px; display: none; margin-bottom: 16px; }
        .security { text-align: center; margin-top: 20px; font-size: 12px; color: #a1a1aa; }
        @media (max-width: 768px) { .container { padding: 16px; } .card { padding: 24px; } .row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo"><div class="logo-icon">🛡️</div><div class="logo-text">SPACE-DOCX</div></div>
            <h1>Finalizar Pagamento</h1>
            <p class="subtitle">Escolha a forma de pagamento</p>

            <div id="errorMsg" class="error"></div>
            <div id="successMsg" class="success"></div>

            <div class="plan-summary" id="planInfo">Carregando...</div>

            <div class="metodo-selector">
                <div class="metodo-btn active" onclick="selecionarMetodo('credit_card')">💳 Cartão</div>
                <div class="metodo-btn" onclick="selecionarMetodo('pix')">📱 PIX</div>
            </div>

            <form id="paymentForm">
                <div class="form-group"><label>Nome completo</label><input type="text" id="nome" required></div>
                <div class="form-group"><label>E-mail</label><input type="email" id="email" required></div>
                <div class="row">
                    <div><label>CPF</label><input type="text" id="cpf" placeholder="000.000.000-00" required></div>
                    <div><label>Telefone</label><input type="text" id="telefone" placeholder="(11) 99999-9999"></div>
                </div>

                <div id="cartaoFields">
                    <div class="form-group"><label>Número do cartão</label><input type="text" id="cardNumber" placeholder="4111 1111 1111 1111" maxlength="19"></div>
                    <div class="form-group"><label>Nome no cartão</label><input type="text" id="cardHolder" placeholder="Como está no cartão"></div>
                    <div class="row">
                        <div><label>Validade</label><input type="text" id="cardExpiry" placeholder="MM/AA" maxlength="5"></div>
                        <div><label>CVV</label><input type="text" id="cardCvv" placeholder="123" maxlength="4"></div>
                    </div>
                </div>

                <button type="submit" class="btn" id="submitBtn">Pagar agora</button>
            </form>

            <div class="security">🔒 Pagamento seguro criptografado<br>✅ Transação protegida pela HyperCash</div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const planoId = window.location.pathname.split('/').pop();
        let cardToken = null;
        let sdkInicializado = false;
        let metodoSelecionado = 'credit_card';
        
        const PUBLIC_KEY = "{{ public_key }}";
        const planos = { 'basico': { nome: 'Básico', preco: 49 }, 'profissional': { nome: 'Profissional', preco: 149 }, 'enterprise': { nome: 'Enterprise', preco: 349 } };
        const plano = planos[planoId] || planos['profissional'];
        
        document.getElementById('planInfo').innerHTML = `<div style="margin-bottom:8px;">Plano ${plano.nome}</div><div class="plan-price">R$ ${plano.preco}<span>/mês</span></div>`;
        
        // Inicializar SDK HyperCash
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                await FastSoft.setPublicKey(PUBLIC_KEY);
                sdkInicializado = true;
                console.log('SDK HyperCash inicializado');
            } catch (error) {
                console.error('Erro ao inicializar SDK:', error);
                mostrarErro('Erro ao carregar sistema de pagamento. Recarregue a página.');
            }
        });
        
        function selecionarMetodo(metodo) {
            metodoSelecionado = metodo;
            document.querySelectorAll('.metodo-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('cartaoFields').style.display = metodo === 'credit_card' ? 'block' : 'none';
        }
        
        // Formatações
        document.getElementById('cpf').addEventListener('input', function(e) {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 11) v = v.slice(0,11);
            if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
            else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
            else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, '$1.$2');
            e.target.value = v;
        });
        
        document.getElementById('cardNumber').addEventListener('input', function(e) {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 16) v = v.slice(0,16);
            v = v.replace(/(\d{4})(?=\d)/g, '$1 ');
            e.target.value = v;
        });
        
        document.getElementById('cardExpiry').addEventListener('input', function(e) {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 4) v = v.slice(0,4);
            if (v.length > 2) v = v.slice(0,2) + '/' + v.slice(2);
            e.target.value = v;
        });
        
        function mostrarErro(msg) {
            const div = document.getElementById('errorMsg');
            div.textContent = msg;
            div.style.display = 'block';
            setTimeout(() => div.style.display = 'none', 5000);
        }
        
        async function tokenizarCartao() {
            if (!sdkInicializado) {
                throw new Error('Sistema de pagamento não inicializado. Aguarde e tente novamente.');
            }
            
            const cardData = {
                number: document.getElementById('cardNumber').value.replace(/\s/g, ''),
                holderName: document.getElementById('cardHolder').value.toUpperCase(),
                expMonth: document.getElementById('cardExpiry').value.split('/')[0],
                expYear: '20' + document.getElementById('cardExpiry').value.split('/')[1],
                cvv: document.getElementById('cardCvv').value
            };
            
            if (!cardData.number || cardData.number.length < 16) throw new Error('Número do cartão inválido');
            if (!cardData.holderName) throw new Error('Nome do portador é obrigatório');
            if (!cardData.expMonth || cardData.expMonth.length < 2) throw new Error('Data de validade inválida');
            if (!cardData.cvv || cardData.cvv.length < 3) throw new Error('CVV inválido');
            
            try {
                const token = await FastSoft.encrypt(cardData);
                return token;
            } catch (error) {
                console.error('Erro tokenização:', error);
                throw new Error(error.message || 'Erro ao processar cartão');
            }
        }
        
        document.getElementById('paymentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const errorDiv = document.getElementById('errorMsg');
            const successDiv = document.getElementById('successMsg');
            
            btn.disabled = true;
            btn.textContent = 'Processando...';
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const cpf = document.getElementById('cpf').value.replace(/\D/g, '');
            
            if (!nome || !email || !cpf || cpf.length !== 11) {
                mostrarErro('Preencha todos os dados corretamente');
                btn.disabled = false;
                btn.textContent = 'Pagar agora';
                return;
            }
            
            let card_token = null;
            
            try {
                if (metodoSelecionado === 'credit_card') {
                    card_token = await tokenizarCartao();
                    if (!card_token) throw new Error('Erro na tokenização do cartão');
                }
                
                const payload = {
                    plano: planoId,
                    metodo: metodoSelecionado,
                    nome: nome,
                    email: email,
                    cpf: cpf,
                    card_token: card_token
                };
                
                const response = await fetch('/api/criar-pagamento', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    if (metodoSelecionado === 'pix') {
                        successDiv.style.display = 'block';
                        successDiv.innerHTML = `
                            <strong>✅ Pagamento via PIX gerado!</strong>
                            <div class="pix-area">
                                <div class="pix-code">${data.pix_code || 'Código PIX gerado'}</div>
                                <button onclick="copiarPix('${data.pix_code}')" class="btn" style="margin-top:8px; background:#1a1a1a;">📋 Copiar código PIX</button>
                            </div>
                            <div style="margin-top:16px;">Após o pagamento, sua conta será ativada automaticamente.</div>
                        `;
                        btn.disabled = false;
                        btn.textContent = 'Pagar agora';
                    } else {
                        alert(data.message || 'Pagamento aprovado!');
                        window.location.href = '/dashboard';
                    }
                } else {
                    mostrarErro(data.error || 'Erro no pagamento');
                    btn.disabled = false;
                    btn.textContent = 'Pagar agora';
                }
            } catch(error) {
                mostrarErro(error.message);
                btn.disabled = false;
                btn.textContent = 'Pagar agora';
            }
        });
        
        function copiarPix(codigo) {
            navigator.clipboard.writeText(codigo);
            alert('Código PIX copiado!');
        }
    </script>
</body>
</html>
