<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Space-Docx</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { width: 100%; max-width: 500px; padding: 24px; }
        .card { background: #111; border: 1px solid #1f1f1f; border-radius: 24px; padding: 40px; }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo-icon { font-size: 48px; }
        .logo-text { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        h1 { font-size: 24px; margin-bottom: 8px; }
        .subtitle { color: #a1a1aa; font-size: 14px; margin-bottom: 24px; }
        .plan-summary { background: #1a1a1a; border-radius: 16px; padding: 20px; margin-bottom: 24px; text-align: center; }
        .plan-price { font-size: 28px; font-weight: 700; color: #3b82f6; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 13px; color: #a1a1aa; margin-bottom: 8px; }
        input { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; color: white; font-size: 14px; }
        input:focus { outline: none; border-color: #3b82f6; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #3b82f6, #2563eb); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; margin-top: 16px; font-size: 16px; }
        .security { text-align: center; margin-top: 20px; font-size: 12px; color: #a1a1aa; }
        .error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); padding: 12px; border-radius: 12px; margin-bottom: 20px; color: #ef4444; font-size: 13px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo"><div class="logo-icon">🛸</div><div class="logo-text">SPACE-DOCX</div></div>
            <h1>Finalizar Assinatura</h1>
            <p class="subtitle">Preencha os dados para ativar seu plano</p>
            <div id="errorMsg" class="error"></div>
            <div class="plan-summary" id="planInfo">Carregando...</div>
            <form id="paymentForm">
                <div class="form-group"><label>Nome completo</label><input type="text" id="cardHolder" required></div>
                <div class="form-group"><label>Cartão de crédito</label><input type="text" id="cardNumber" placeholder="4111 1111 1111 1111" required></div>
                <div class="row">
                    <div><label>Validade</label><input type="text" id="cardExpiry" placeholder="MM/AA" required></div>
                    <div><label>CVV</label><input type="text" id="cardCvv" placeholder="123" required></div>
                </div>
                <div class="form-group"><label>CPF</label><input type="text" id="document" required></div>
                <button type="submit" class="btn" id="submitBtn">Pagar agora</button>
            </form>
            <div class="security">🔒 Pagamento seguro<br>✅ Teste grátis disponível</div>
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const planoId = urlParams.get('plano') || 'profissional';
        const planos = { 'basico': { nome: 'Básico', preco: 49 }, 'profissional': { nome: 'Profissional', preco: 149 }, 'enterprise': { nome: 'Enterprise', preco: 349 }, 'trial': { nome: 'Teste Grátis', preco: 0 } };
        const plano = planos[planoId] || planos['profissional'];
        document.getElementById('planInfo').innerHTML = `<div style="margin-bottom:8px;">Plano ${plano.nome}</div><div class="plan-price">R$ ${plano.preco}<span>/mês</span></div>`;
        
        document.getElementById('paymentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Processando...';
            try {
                const response = await fetch('/api/criar-pagamento', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ plano: planoId })
                });
                const data = await response.json();
                if (data.success) {
                    alert(data.message);
                    window.location.href = data.redirect;
                } else {
                    document.getElementById('errorMsg').textContent = data.error;
                    document.getElementById('errorMsg').style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Pagar agora';
                }
            } catch(error) {
                document.getElementById('errorMsg').textContent = 'Erro no pagamento';
                document.getElementById('errorMsg').style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Pagar agora';
            }
        });
    </script>
</body>
</html>
