<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Space-Docx</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-container { width: 100%; max-width: 440px; padding: 24px; }
        .login-card { background: #111; border: 1px solid #1f1f1f; border-radius: 24px; padding: 40px; }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo-icon { font-size: 48px; }
        .logo-text { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        h1 { font-size: 24px; margin-bottom: 8px; }
        .subtitle { color: #a1a1aa; font-size: 14px; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; color: #a1a1aa; margin-bottom: 8px; }
        input { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; color: white; }
        input:focus { outline: none; border-color: #3b82f6; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #3b82f6, #2563eb); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; margin-top: 8px; }
        .trial-section { border-top: 1px solid #1f1f1f; padding-top: 24px; margin-top: 24px; }
        .trial-title { font-size: 12px; color: #a1a1aa; text-align: center; margin-bottom: 16px; }
        .register-link { text-align: center; margin-top: 24px; font-size: 13px; color: #a1a1aa; }
        .register-link a { color: #3b82f6; text-decoration: none; }
        .flash-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); padding: 12px; border-radius: 10px; margin-bottom: 20px; color: #ef4444; font-size: 13px; }
        .flash-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); padding: 12px; border-radius: 10px; margin-bottom: 20px; color: #22c55e; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo"><div class="logo-icon">🛸</div><div class="logo-text">SPACE-DOCX</div></div>
            <h1>Acessar plataforma</h1>
            <p class="subtitle">Insira suas credenciais</p>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            <form method="POST">
                <div class="form-group"><label>E-mail</label><input type="email" name="email" required></div>
                <div class="form-group"><label>Senha</label><input type="password" name="senha" required></div>
                <button type="submit" class="btn">Entrar</button>
            </form>
            <div class="trial-section">
                <div class="trial-title">Teste gratuito 7 dias</div>
                <div class="form-group"><label>Chave de teste</label><input type="text" id="chaveTeste" placeholder="FREE-TRIAL-7DAYS"></div>
                <button onclick="usarChaveTeste()" class="btn" style="background: #1a1a1a; border: 1px solid #2a2a2a;">Ativar teste</button>
            </div>
            <div class="register-link">Não tem conta? <a href="/registro">Cadastre-se</a></div>
        </div>
    </div>
    <script>
        function usarChaveTeste() {
            const chave = document.getElementById('chaveTeste').value;
            if (!chave) { alert('Digite a chave: FREE-TRIAL-7DAYS'); return; }
            const formData = new FormData();
            formData.append('email', 'teste@temp.com');
            formData.append('senha', 'temp');
            formData.append('chave', chave);
            fetch('/login', { method: 'POST', body: formData }).then(r => { if (r.redirected) window.location.href = r.url; });
        }
    </script>
</body>
</html>
